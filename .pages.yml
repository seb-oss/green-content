  - name: pages
    label: Pages
    type: collection
    format: "json"
    path: content/pages
    filename: "{fields.slug}.json"
    view:
      fields: [title, parent]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - { name: summary, label: Summary, type: rich-text }
      - name: parent
        label: Parent
        type: reference
        options:
          collection: pages
          multiple: false
          search: "title,slug"
          value: "{slug}"
          label: "{title}"
      - name: layout
        label: Layout
        type: select
        options:
          values: ["editorial", "collection"]
      - name: sections
        type: object
        label: Sections
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: tag
            label: Tag
            type: select
            options:
              values: [H2, H3, H4, H5]
          - name: section-content
            label: Content
            type: rich-text
          - name: max-width
            label: Max width 80ch
            type: boolean
            default: false
          - name: cols
            label: Columns
            type: select
            options:
              values: ["1", "2", "3"]
          - name: columns
            label: Columns
            type: block
            list: true
            blockKey: type
            blocks:
              - name: figma
                label: Figma Node
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: node
                    label: IMG ID
                    type: string
              - name: rich-text
                label: Rich Text
                fields:
                  - name: title
                    label: Title
                    type: string
                  - name: tag
                    label: Tag
                    type: select
                    options:
                      values: [H2, H3, H4, H5]
                  - name: content
                    label: Rich Text
                    type: rich-text
              - name: paragraph
                label: Paragraph
                fields:
                  - name: tag
                    label: Tag
                    type: string
                  - name: size
                    label: Size
                    type: string
                  - name: text
                    label: Text
                    type: text
              - name: snippet
                label: Snippet
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: plain
                    label: Plain
                    type: boolean
                  - name: replay
                    label: Replay
                    type: boolean
                  - name: variant
                    label: Variant
                    type: select
                    options:
                      values: [Do, Dont]
                  - name: Snippet
                    type: reference
                    options:
                      collection: snippets
                      multiple: false
                      search: "title"
                      value: "{slug}"
                      label: "{title}"
              - name: image
                label: Image
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: width
                    label: Width
                    type: string
                  - name: height
                    label: Height
                    type: string
                  - name: ratio
                    label: Ratio
                    type: string
                  - name: src
                    label: Image
                    type: image
              - name: code
                label: Code
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: code
                    label: Code
                    type: code
                    options:
                      language: html
              - name: do
                label: Do
                fields:
                  - name: dolist
                    label: "Do"
                    type: object
                    list: true
                    fields:
                      - name: text
                        label: "Text"
                        type: string
              - name: dont
                label: Dont
                fields:
                  - name: dontlist
                    label: "Dont"
                    type: object
                    list: true
                    fields:
                      - name: text
                        label: "Text"
                        type: string

  - name: navigation
    label: Navigation
    type: collection
    format: "json"
    path: content/navigation
    view:
      fields: [title]
    filename: "{fields.slug}.json"
    fields:
      - { name: title, label: Title, type: string }
      - { name: slug, label: Slug, type: string }
      - name: links
        label: Links
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string }
          - { name: slug, label: Slug, type: string }
          - { name: icon, label: Icon, type: string }

  - name: templates
    label: Templates
    type: collection
    format: "json"
    path: content/templates
    filename: "{fields.slug}.json"
    view:
      fields: [title, date]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - name: code
        label: Code
        type: code
        options:
          language: html
      - name: related_components
        label: Related Components
        type: reference
        options:
          collection: components
          multiple: true
          search: "title"
          value: "{title}"
          label: "{title}"
  - name: snippets
    label: Snippets
    type: collection
    format: "json"
    path: content/snippets
    filename: "{fields.slug}.json"
    view:
      fields: [title, slug, snippet_component]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - name: dependencies
        label: Dependencies
        type: select
        options:
          multiple: true
          creatable: true
      - name: snippet_component
        label: Component
        type: reference
        options:
          collection: components
          multiple: false
          search: "title"
          value: "{title}"
          label: "{title}"
      - name: code
        label: Code
        type: code
        options:
          language: html
  - name: team
    label: Team
    type: collection
    format: "json"
    path: content/team
    filename: "{fields.handle}.json"
    view:
      fields: [firstName, lastName, handle, role]
    fields:
      - { name: firstName, label: First Name, type: string, required: true }
      - { name: lastName, label: Last Name, type: string, required: true }
      - { name: handle, label: Handle, type: string, required: true }
      - { name: role, label: Role, type: string }
      - name: avatar
        label: Avatar Image
        type: image
      - { name: initials, label: Initials (override), type: string }
      - { name: color, label: Initials Color, type: string }
      - { name: background, label: Avatar Background Color, type: string }
      - { name: bio, label: Bio, type: text }
      - { name: email, label: Email, type: string }

  - name: blog
    label: Blog
    type: collection
    format: "json"
    path: content/blog
    filename: "{fields.slug}.json"
    view:
      fields: [title, published, pinned, createdAt]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - name: published
        label: Published
        type: boolean
        default: false
      - name: pinned
        label: Pinned
        type: boolean
        default: false
      - name: cover
        label: Cover
        type: block
        blockKey: type
        blocks:
          - name: image
            label: Image
            fields:
              - { name: src, label: Image, type: image }
              - { name: alt, label: Alt text, type: string }
          - name: video
            label: Video
            fields:
              - { name: src, label: Video URL, type: string }
          - name: snippet
            label: Snippet
            fields:
              - name: slug
                label: Snippet
                type: reference
                options:
                  collection: snippets
                  multiple: false
                  search: "title,slug"
                  value: "{slug}"
                  label: "{title}"
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - { value: "design", label: Design }
            - { value: "engineering", label: Engineering }
            - { value: "release", label: Release }
            - { value: "update", label: Update }
            - { value: "announcement", label: Announcement }
            - { value: "tutorial", label: Tutorial }
      - name: authors
        label: Authors
        type: reference
        options:
          collection: team
          multiple: true
          search: "firstName,lastName,handle"
          value: "{handle}"
          label: "{firstName} {lastName}"
      - name: content
        label: Content
        type: rich-text
      - { name: createdAt, label: Published Date, type: date }
      - { name: updatedAt, label: Last Updated, type: date }

  - name: home
    label: Home
    type: file
    format: "json"
    path: content/home.json
    view:
      fields: [title, date]
    fields:
      - { name: title, label: Title, type: string }
