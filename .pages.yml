media:
  input: data/assets
  output: /assets
  path: stg.seb.io/assets
  categories: ["image"]
  extensions: [png, webp, mp4, jpg, jpeg, pdf]
content:
  - name: components
    label: Components
    type: collection
    format: "json"
    subfolders: false
    path: content/components
    filename: "{fields.slug}.json"
    view:
      fields: [title, date, status]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - name: hero_snippet
        label: Hero Snippet
        type: reference
        options:
          collection: snippets
          multiple: false
          search: "title"
          value: "{slug}"
          label: "{title}"
      - name: beta
        label: Beta
        type: boolean
        default: false
      - name: soon
        label: Cooming soon
        type: boolean
        default: false
      - { name: summary, label: Summary, type: string }
      - { name: preamble, label: Preamble, type: text }
      - name: anatomy
        label: Anatomy
        type: boolean
        default: true
      - { name: anatomy-overview, label: "Antomy: Overview", type: rich-text }
      - { name: anatomy-details, label: "Antomy: Details", type: rich-text }
      - name: anatomy-list
        label: Anatomy List
        fields:
          - name: anatomyitems
            label: "List"
            type: object
            list: true
            fields:
              - name: text
                label: "Text"
                type: string

      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - value: "action"
              label: Action
            - value: "button"
              label: Button
            - value: "data"
              label: Data
            - value: "date"
              label: Date
            - value: "date-range"
              label: Date Range
            - value: "editorial"
              label: Editorial
            - value: faq
              label: FAQ
            - value: "feedback"
              label: Feedback
            - value: "filter"
              label: Filter
            - value: "form"
              label: Form
            - value: "format"
              label: Format
            - value: "free-text"
              label: Free Text
            - value: "guidance"
              label: Guidance
            - value: "input"
              label: Input
            - value: "preloader"
              label: Preloader
            - value: "media"
              label: Media
            - value: "modal"
              label: Modal
            - value: "navigation"
              label: Navigation
            - value: "notification"
              label: Notification
            - value: "onboarding"
              label: Onboarding
            - value: "select"
              label: Select
            - value: "slide-out"
              label: Slide Out
            - value: "status"
              label: Status
            - value: "symbol"
              label: Symbol
            - value: "text"
              label: Text
            - value: "text-entry"
              label: Text Entry
            - value: "text-field"
              label: Text Field
            - value: "time"
              label: Time
            - value: "tooltip"
              label: Tooltip
            - value: "walkthrough"
              label: Walkthrough

      - name: category
        label: Category
        type: select
        options:
          multiple: true
          values: [Components, Patterns, Elements, Layout, Tokens, Utils]
      - name: platform
        label: Platform
        type: object
        fields:
          - name: web
            label: Web
            type: boolean
            default: false
          - name: ios
            label: iOS
            type: boolean
            default: false
          - name: android
            label: Android
            type: boolean
            default: false
      - name: compare
        label: Compare
        type: reference
        options:
          collection: components
          multiple: false
          search: "title"
          value: "{title}"
          label: "{title}"
      - name: compare-content
        label: "Compare text: for this component"
        type: rich-text
      - name: overview
        type: object
        label: Overview
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: tag
            label: Tag
            type: select
            options:
              values: [H2, H3, H4, H5]
          - name: section-content
            label: Content
            type: rich-text
          - name: cols
            label: Columns
            type: select
            options:
              values: ["1", "2", "3"]
          - name: columns
            label: Columns
            type: block
            list: true
            blockKey: type
            blocks:
              - name: figma
                label: Figma Node
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: node
                    label: IMG ID
                    type: string
              - name: rich-text
                label: Rich Text
                fields:
                  - name: title
                    label: Title
                    type: string
                  - name: tag
                    label: Tag
                    type: select
                    options:
                      values: [H2, H3, H4, H5]
                  - name: content
                    label: Rich Text
                    type: rich-text
              - name: paragraph
                label: Paragraph
                fields:
                  - name: tag
                    label: Tag
                    type: string
                  - name: size
                    label: Size
                    type: string
                  - name: text
                    label: Text
                    type: text
              - name: snippet
                label: Snippet
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: plain
                    label: Plain
                    type: boolean
                  - name: replay
                    label: Replay
                    type: boolean
                  - name: variant
                    label: Variant
                    type: select
                    options:
                      values: [Do, Dont]
                  - name: Snippet
                    type: reference
                    options:
                      collection: snippets
                      multiple: false
                      search: "title,slug"
                      value: "{slug}"
                      label: "{title}"
              - name: image
                label: Image
                fields:
                  - name: caption
                    label: Caption
                    type: string
                  - name: width
                    label: Width
                    type: string
                  - name: height
                    label: Height
                    type: string
                  - name: ratio
                    label: Ratio
                    type: string
                  - name: src
                    label: Image
                    type: image
              - name: details
